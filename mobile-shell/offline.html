<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>UG Movies 247 Offline</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px;
      font-family: Arial, sans-serif;
      color: #fff;
      background:
        radial-gradient(circle at 20% 10%, rgba(217,4,41,.32), transparent 32%),
        radial-gradient(circle at 80% 0%, rgba(255,255,255,.09), transparent 28%),
        linear-gradient(180deg, #090b10 0%, #050608 100%);
    }
    .card {
      width: 100%;
      max-width: 420px;
      text-align: center;
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 30px;
      padding: 34px 22px;
      background: rgba(13, 17, 24, .82);
      box-shadow: 0 24px 80px rgba(0,0,0,.55);
    }
    .logo {
      width: 92px;
      height: 92px;
      margin: 0 auto 22px;
      display: grid;
      place-items: center;
      border-radius: 28px;
      background: linear-gradient(145deg, #d90429, #53000f);
      font-weight: 900;
      font-size: 14px;
      line-height: 1.05;
      letter-spacing: .04em;
      box-shadow: 0 16px 36px rgba(217,4,41,.35);
    }
    h1 { margin: 0; font-size: 34px; line-height: 1.05; letter-spacing: -.04em; }
    p { margin: 14px 0 0; color: rgba(255,255,255,.72); font-size: 16px; line-height: 1.55; }
    .actions { display: grid; gap: 12px; margin-top: 28px; }
    button {
      width: 100%;
      border: 0;
      border-radius: 18px;
      padding: 16px 18px;
      color: #fff;
      font-size: 14px;
      font-weight: 900;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    .primary { background: #d90429; }
    .secondary { background: rgba(255,255,255,.10); border: 1px solid rgba(255,255,255,.12); }
    .note { margin-top: 18px; font-size: 13px; color: rgba(255,255,255,.46); }
  </style>
</head>
<body>
  <main class="card">
    <div class="logo">UG<br>MOVIES<br>24_7</div>
    <h1>You’re offline</h1>
    <p>Connect to the internet to browse movies, or open your saved downloads.</p>
    <div class="actions">
      <button class="primary" onclick="location.href='https://ugmovies247.com/downloads'">Open Downloads</button>
      <button class="secondary" onclick="location.href='https://ugmovies247.com/browse'">Try Again</button>
    </div>
    <p class="note">Already downloaded movies can still be watched offline.</p>
  </main>
</body>
</html>
